{{- if and .Values.azureKeyVault.enabled .Values.azureKeyVault.secretProviderClass.create }}
{{- $akvKeyVaultName := required "azureKeyVault.secretProviderClass.keyVaultName is required when creating a SecretProviderClass" .Values.azureKeyVault.secretProviderClass.keyVaultName }}
{{- $akvTenantId := required "azureKeyVault.secretProviderClass.tenantId is required when creating a SecretProviderClass" .Values.azureKeyVault.secretProviderClass.tenantId }}
{{- $akvObjects := (include "nv-ingest.azureKeyVault.objects" . | trim) | required "azureKeyVault.secretProviderClass.objects must include at least one entry when creating a SecretProviderClass" }}
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "nv-ingest.azureKeyVault.secretProviderClassName" . }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "{{ ternary "true" "false" .Values.azureKeyVault.secretProviderClass.usePodIdentity }}"
    useVMManagedIdentity: "{{ ternary "true" "false" .Values.azureKeyVault.secretProviderClass.useVMManagedIdentity }}"
    {{- if .Values.azureKeyVault.secretProviderClass.userAssignedIdentityID }}
    userAssignedIdentityID: "{{ .Values.azureKeyVault.secretProviderClass.userAssignedIdentityID }}"
    {{- end }}
    keyvaultName: "{{ $akvKeyVaultName }}"
    tenantId: "{{ $akvTenantId }}"
    {{- if .Values.azureKeyVault.secretProviderClass.cloudName }}
    cloudName: "{{ .Values.azureKeyVault.secretProviderClass.cloudName }}"
    {{- end }}
    objects: |
{{ $akvObjects | nindent 6 }}
    {{- range $k, $v := .Values.azureKeyVault.secretProviderClass.parameters }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
  {{- if .Values.azureKeyVault.secretProviderClass.secretObjects }}
  secretObjects:
{{ toYaml .Values.azureKeyVault.secretProviderClass.secretObjects | indent 4 }}
  {{- end }}
{{- end }}
