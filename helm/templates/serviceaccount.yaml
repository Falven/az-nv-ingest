{{- if .Values.serviceAccount.create -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "nv-ingest.serviceAccountName" . }}
  labels:
    {{- include "nv-ingest.labels" . | nindent 4 }}
    {{- if .Values.workloadIdentity.enabled }}
    azure.workload.identity/use: "true"
    {{- end }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
    {{- if and $.Values.workloadIdentity.enabled $.Values.workloadIdentity.clientId }}
    azure.workload.identity/client-id: "{{ $.Values.workloadIdentity.clientId }}"
    {{- end }}
  {{- else if and .Values.workloadIdentity.enabled .Values.workloadIdentity.clientId }}
  annotations:
    azure.workload.identity/client-id: "{{ .Values.workloadIdentity.clientId }}"
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
{{- end }}
