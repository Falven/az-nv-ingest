{{ if .Values.ngcImagePullSecret.create -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: ngc-secret  # name expected by NIMs
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ template "nv-ingest.ngcImagePullSecret" . }}
{{- end }}


{{ if and .Values.ngcApiSecret.create -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: ngc-api  # Name expected by NIMs
type: Opaque
stringData:
  NGC_CLI_API_KEY: {{ template "nv-ingest.ngcApiSecret" . }}
  NGC_API_KEY: {{ template "nv-ingest.ngcApiSecret" . }}
{{- end }}

{{- if and .Values.azureCognitiveSearch.enabled .Values.azureCognitiveSearch.apiKey.createSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nv-ingest.azureCognitiveSearch.secretName" . }}
type: Opaque
stringData:
  {{ .Values.azureCognitiveSearch.apiKey.secretKey }}: {{ required "azureCognitiveSearch.apiKey.value is required when createSecret is true" .Values.azureCognitiveSearch.apiKey.value | quote }}
{{- end }}

{{- if and .Values.azureOpenAI.enabled .Values.azureOpenAI.apiKey.createSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nv-ingest.azureOpenAI.secretName" . }}
type: Opaque
stringData:
  {{ .Values.azureOpenAI.apiKey.secretKey }}: {{ required "azureOpenAI.apiKey.value is required when createSecret is true" .Values.azureOpenAI.apiKey.value | quote }}
{{- end }}

{{- if and .Values.applicationInsights.enabled .Values.applicationInsights.createSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nv-ingest.applicationInsights.secretName" . }}
type: Opaque
stringData:
  {{ .Values.applicationInsights.secretKey }}: {{ required "applicationInsights.connectionString is required when createSecret is true" .Values.applicationInsights.connectionString | quote }}
{{- end }}
